<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT marketplace</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/market.css">
</head>
<body>

    <!-- header start -->
    <div id="header-placeholder"></div>
    <!-- header end -->

    <!-- connect to wallet start -->
    <section class="wallet-countainer">
        <div class="wallet-sub-container">
            <div class="wallet-left">
                <img src="/images/account/account-image.png" alt="" class="wallet-left-image">
            </div>
            <div class="wallet-right">
                <div class="wallet-right-top">
                    <h2 class="header2">Create account</h2>
                    <p class="wallet-right-text">Welcome! enter your details and start creating, collecting and selling NFTs.</p>
                </div>
                <form action="#" class="account-form">
                    <div class="form-inputs">
                        <div class="account-input-box">
                            <img src="/images/account/user.svg" alt="" class="account-input-icon">
                            <input type="text" class="account-input base-body-text" placeholder="Username">
                        </div>
                        <div class="account-input-box">
                            <img src="/images/account/envelope-simple.svg" alt="" class="account-input-icon">
                            <input type="email" class="account-input base-body-text" placeholder="Email Address">
                        </div>
                        <div class="account-input-box">
                            <img src="/images/account/lock-key.svg" alt="" class="account-input-icon">
                            <input type="password" class="account-input base-body-text" placeholder="Password">
                        </div>
                        <div class="account-input-box">
                            <img src="/images/account/lock-key.svg" alt="" class="account-input-icon">
                            <input type="password" class="account-input base-body-text" placeholder="Confirm Password">
                        </div>
                    </div>
                    <button type="submit" class="account-btn">Create account</button>
                </form>
            </div>
        </div>
    </section>
    <!-- connect to wallet end -->

        <!-- footer start -->
        <div id="footer-placeholder"></div>
        <!-- footer end -->
    
        <script src="loadBlock.js"></script>  

</body>
</html>
