<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT marketplace</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/market.css">
</head>
<body>

    <!-- header start -->
    <div id="header-placeholder"></div>
    <!-- header end -->

    <!-- artist start -->
    <section class="artist-cover">
        <div class="artist-cover-sub">
            <div class="artist-cover-avatar">
                <img src="/images/artist/artist-cover-icon.svg" alt="" class="artist-profile-image">
            </div>
        </div>
    </section>
    <!-- artist end -->

    <!-- artist-info start -->
     <section class="artist-info-container">
        <div class="sub-container artist-info-sub">
            <div class="artist-info-left">
                <h2 class="header2">Animakid</h2>
                <div class="artist-info-stat">
                    <div class="info-stat-item">
                        <h4 class="header4-mono">250k+</h4>
                        <p class="body-text">Volume</p>
                    </div>
                    <div class="info-stat-item">
                        <h4 class="header4-mono">50+</h4>
                        <p class="body-text">NFTs Sold</p>
                    </div>
                    <div class="info-stat-item">
                        <h4 class="header4-mono">3000+</h4>
                        <p class="body-text">Followers</p>
                    </div>
                </div>
                <div class="bio">
                    <h5 class="header5-mono artist-bio">Bio</h5>
                    <p class="body-text">The internet's friendliest designer kid.</p>
                </div>
                <div class="bio">
                    <h5 class="header5-mono artist-bio">Links</h5>
                    <div class="web-links-icons">
                        <img src="/images/artist/globe.svg" alt="" class="web-link-icon">
                        <img src="/images/artist/discord-logo.svg" alt="" class="web-link-icon">
                        <img src="/images/artist/youtube-logo.svg" alt="" class="web-link-icon">
                        <img src="/images/artist/twitter-logo.svg" alt="" class="web-link-icon">
                        <img src="/images/artist/instagram-logo.svg" alt="" class="web-link-icon">
                    </div>
                </div>
            </div>
            <div class="artist-info-right">
                <button class="artist-info-btn"><img src="/images/artist/copy.svg" alt="" class="right-btn">0xc0E3...B79C</button>
                <button class="artist-info-btn right-btn2"><img src="/images/artist/plus.svg" alt="" class="right-btn">Follow</button>
            </div>
        </div>
     </section>
    <!-- artist-info end -->

     <section class="market-top">
        <div class="sub-container">
            <div class="market-top-tabs">
                <div class="tabs">
                    <h5 class="header5">NFTs</h5>
                    <p class="base-body-text-mono tabs-num">302</p>
                </div>
                <div class="tabs noselect">
                    <h5 class="header5">Collections</h5>
                    <p class="base-body-text-mono tabs-num">67</p>
                </div>
                <div class="tabs noselect">
                    <h5 class="header5">Collections</h5>
                    <p class="base-body-text-mono tabs-num">67</p>
                </div>
            </div>
        </div>
     </section>
    
    <!-- footer start -->
    <div id="footer-placeholder"></div>
    <!-- footer end -->

    <script src="loadBlock.js"></script>

</body>
</html>
