<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT marketplace</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/market.css">
</head>
<body>

    <!-- header start -->
    <div id="header-placeholder"></div>
    <!-- header end -->

    <!-- connect to wallet start -->
    <section class="wallet-countainer">
        <div class="wallet-sub-container">
            <div class="wallet-left">
                <img src="/images/wallet/wallet-left-image.png" alt="" class="wallet-left-image">
            </div>
            <div class="wallet-right">
                <div class="wallet-right-top">
                    <h2 class="header2">Connect wallet</h2>
                    <p class="wallet-right-text">Choose a wallet you want to connect. There are several wallet providers.</p>
                </div>
                <div class="wallet-option">
                    <div class="wallet-option-item">
                        <img src="/images/wallet/metamask.svg" alt="" class="wallet-option-item-image">
                        <h5 class="header5">Metamask</h5>
                    </div>
                    <div class="wallet-option-item">
                        <img src="/images/wallet/wallet-connect.svg" alt="" class="wallet-option-item-image">
                        <h5 class="header5">Wallet Connect</h5>
                    </div>
                    <div class="wallet-option-item">
                        <img src="/images/wallet/coinbase.svg" alt="" class="wallet-option-item-image">
                        <h5 class="header5">Coinbase</h5>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- connect to wallet end -->

    <!-- footer start -->
    <div id="footer-placeholder"></div>
     <!-- footer end -->

     <script src="loadBlock.js"></script>

</body>
</html>
